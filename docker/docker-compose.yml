# =============================================================================
# EAFIT Team A — Local Docker Compose
# =============================================================================
#
# Runs the agent support services locally:
#   - Chatbot (hologram-generic-ai-agent) with Claude (Anthropic) LLM
#   - Redis (vector store, memory, queues)
#   - PostgreSQL (session persistence)
#
# The VS Agent is started separately by scripts/setup.sh (standalone container).
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - VS Agent running (via scripts/setup.sh)
#   - ANTHROPIC_API_KEY set in environment
#   - ids.env generated by scripts/setup.sh
#
# Usage:
#   set -a && source config.env && source ids.env && set +a
#   export ANTHROPIC_API_KEY=sk-ant-...
#   docker compose -f docker/docker-compose.yml up
#
# =============================================================================

services:
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eafit_team_a}
      - POSTGRES_USER=${POSTGRES_USER:-team_a_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data

  artemis:
    image: apache/activemq-artemis:2.31.2
    ports:
      - "8162:8161"

  chatbot:
    build:
      context: ..
      dockerfile: Dockerfile
    platform: linux/amd64
    env_file:
      - ../ids.env
    ports:
      - "${CHATBOT_PORT:-3003}:${CHATBOT_PORT:-3003}"
    environment:
      - APP_PORT=${CHATBOT_PORT:-3003}
      - AGENT_PACK_PATH=/app/agent-packs/eafit-team-a
      - LOG_LEVEL=3
      - LLM_PROVIDER=anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=claude-haiku-4-5-20251001
      - RAG_PROVIDER=vectorstore
      - RAG_DOCS_PATH=/app/rag/docs
      - VECTOR_STORE=redis
      - VECTOR_INDEX_NAME=eafit_team_a
      - AGENT_MEMORY_BACKEND=redis
      - AGENT_MEMORY_WINDOW=20
      - REDIS_URL=redis://redis:6379
      - VS_AGENT_ADMIN_URL=http://host.docker.internal:${VS_AGENT_ADMIN_PORT:-3010}
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-team_a_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB_NAME=${POSTGRES_DB:-eafit_team_a}
      - CREDENTIAL_DEFINITION_ID=${CREDENTIAL_DEFINITION_ID}
      - GITHUB_MCP_URL=${GITHUB_MCP_URL:-https://api.githubcopilot.com/mcp/}
      - MCP_CONFIG_ENCRYPTION_KEY=${MCP_CONFIG_ENCRYPTION_KEY:-}
      - VS_AGENT_STATS_ENABLED=true
      - VS_AGENT_STATS_HOST=artemis
      - VS_AGENT_STATS_PORT=61616
      - VS_AGENT_STATS_QUEUE=stats-queue
      - VS_AGENT_STATS_USER=artemis
      - VS_AGENT_STATS_PASSWORD=artemis
    volumes:
      - chatbot-data:/app/data
      - ../agent-pack.yaml:/app/agent-packs/eafit-team-a/agent-pack.yaml:ro
      - ../docs:/app/rag/docs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres
      - artemis

volumes:
  redis-data:
  postgres-data:
  chatbot-data:
